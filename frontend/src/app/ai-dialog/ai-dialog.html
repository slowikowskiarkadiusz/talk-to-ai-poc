<!-- HEADER -->
<div mat-dialog-title class="dialog-title">
  <div class="title-left">
    <span class="recording-dot" [class.active]="isRecording"></span>
    <span>{{ titleLabel }}</span>
  </div>
  <button mat-icon-button (click)="onClose()">
    <mat-icon>close</mat-icon>
  </button>
</div>

<!-- CONTENT -->
<mat-dialog-content>
  <p class="section-label">Example actions:</p>

  <!--<mat-chip-set>
    <mat-chip *ngFor="let action of actions" [disabled]="true">
      <mat-icon matChipAvatar>{{ action.icon }}</mat-icon>
      {{ action.label }}
    </mat-chip>
  </mat-chip-set>-->

  <div style="display: flex; flex-direction: column; gap: 8px">
    <div *ngFor="let action of actions">
      <div style="display: flex; flex-direction: column; gap: 4px">
        <span
          *ngFor="let ex of action.examples"
          style="
            font-size: 13px;
            color: rgba(0, 0, 0, 0.55);
            border-left: 2px solid rgba(0, 0, 0, 0.15);
            padding: 4px 10px;
            font-style: italic;
            display: block;
          "
        >
          "{{ ex }}"
        </span>
      </div>
    </div>
  </div>

  <p class="transcript-text" style="margin-top: 20px" [class.placeholder]="!transcript">
    {{ transcript || 'Start speaking… text will appear here automatically.' }}
  </p>

  <div class="speech-fab-wrapper">
    <button mat-fab extended color="primary" (click)="onFinish()" [disabled]="!transcript">
      <mat-icon>check</mat-icon>
      Done
    </button>
  </div>
</mat-dialog-content>

<!-- ACTIONS -->
<mat-dialog-actions align="end">
  <button mat-button (click)="onClose()">Cancel</button>
</mat-dialog-actions>
