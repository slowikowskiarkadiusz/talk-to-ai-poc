<!-- HEADER -->
<div mat-dialog-title class="dialog-title">
  <div class="title-left">
    <span class="recording-dot" [class.active]="isRecording && !isLoading"></span>
    <span>{{ titleLabel }}</span>
  </div>
  <button mat-icon-button (click)="onClose()" [disabled]="isLoading">
    <mat-icon>close</mat-icon>
  </button>
</div>

<!-- CONTENT -->
<mat-dialog-content>
  <div class="spinner-wrapper" *ngIf="isLoading">
    <mat-spinner diameter="48"></mat-spinner>
    <p class="spinner-label">Processing your input…</p>
    <p class="spinner-label-error" *ngIf="wasError">Error occured while processing your request. Trying again...</p>
  </div>

  <p class="section-label" *ngIf="!isLoading">Example actions:</p>

  <!--<mat-chip-set>
    <mat-chip *ngFor="let action of actions" [disabled]="true">
      <mat-icon matChipAvatar>{{ action.icon }}</mat-icon>
      {{ action.label }}
    </mat-chip>
  </mat-chip-set>-->

  <div style="display: flex; flex-direction: column; gap: 8px" *ngIf="!isLoading">
    <div *ngFor="let action of actions">
      <div style="display: flex; flex-direction: column; gap: 4px">
        <span
          *ngFor="let ex of action.examples"
          style="
            font-size: 13px;
            color: rgba(0, 0, 0, 0.55);
            border-left: 2px solid rgba(0, 0, 0, 0.15);
            padding: 4px 10px;
            font-style: italic;
            display: block;
          "
        >
          "{{ ex }}"
        </span>
      </div>
    </div>
  </div>

  <p
    class="transcript-text"
    style="margin-top: 20px"
    [class.placeholder]="!transcript"
    *ngIf="!isLoading"
  >
    {{ transcript || 'Start speaking… text will appear here automatically.' }}
  </p>

  <!--<div class="speech-fab-wrapper" *ngIf="!isLoading">-->
    <!--<button mat-fab extended color="primary" (click)="onFinish()" [disabled]="!transcript">
      <mat-icon>check</mat-icon>
      Done
    </button>
  </div>-->
</mat-dialog-content>

<!-- ACTIONS -->
<mat-dialog-actions align="end" *ngIf="!isLoading">
  <button mat-button (click)="onClose()">Cancel</button>
</mat-dialog-actions>
